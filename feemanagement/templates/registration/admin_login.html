{% extends 'base.html' %}

{% block title %}Admin Login{% endblock %}

{% block content %}
    <h1>Admin Login</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login as Admin</button>
    </form>
    <p>Not an admin? <a href="{% url 'student_login' %}">Student Login</a></p>
{% endblock %}
