{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="auth-container glass" style="max-width: 500px; margin: 60px auto; padding: 48px; border-radius: 32px;">
    <h2 class="auth-header" style="margin-bottom: 24px; text-align: center;">Forgot Password?</h2>
    <p style="color: var(--text-muted); margin-bottom: 32px; text-align: center;">Enter your email address below, and we'll send you instructions to reset your password.</p>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="Enter your registered email" required style="height: 60px;">
        </div>
        <button type="submit" class="auth-btn" style="width: 100%; padding: 18px; border-radius: 16px; margin-top: 12px;">Send Reset Link</button>
    </form>
</div>
{% endblock %}
