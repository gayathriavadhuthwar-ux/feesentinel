{% extends 'base.html' %}

{% block title %}Admin Register{% endblock %}

{% block content %}
    <h1>Admin Registration</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register as Admin</button>
    </form>
    <p>Already an admin? <a href="{% url 'admin_login' %}">Login here</a></p>
{% endblock %}
