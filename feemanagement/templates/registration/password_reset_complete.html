{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="auth-container glass" style="max-width: 500px; margin: 60px auto; padding: 64px; border-radius: 32px; text-align: center;">
    <div style="background: rgba(16, 185, 129, 0.1); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 32px; border: 1px solid rgba(16, 185, 129, 0.2);">
        <i data-lucide="check-circle" style="color: #34d399; width: 40px; height: 40px;"></i>
    </div>
    <h2 class="auth-header" style="margin-bottom: 16px;">Success!</h2>
    <p style="color: var(--text-muted); margin-bottom: 32px;">Your password has been set. You may now log in with your new password.</p>
    <a href="{% url 'student_auth' %}" class="auth-btn" style="display: inline-block; width: auto; padding: 14px 32px; text-decoration: none;">Log In Now</a>
</div>
{% endblock %}
