{% extends 'base.html' %}

{% block title %}Student Login{% endblock %}

{% block content %}
    <h1>Student Login</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login as Student</button>
    </form>
    <p>Not a student? <a href="{% url 'admin_login' %}">Admin Login</a></p>
    <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
{% endblock %}
